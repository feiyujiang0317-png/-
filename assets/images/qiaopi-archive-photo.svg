<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="侨批档案照片：批封、家书、汇款凭证与邮戳">
  <defs>
    <linearGradient id="photoBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3228"/>
      <stop offset="100%" stop-color="#1e1812"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4E8CC"/>
      <stop offset="100%" stop-color="#D9C49A"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" opacity="0.08"/>
    </filter>
  </defs>
  <rect width="900" height="600" fill="url(#photoBg)"/>
  <rect x="40" y="30" width="820" height="540" rx="3" fill="#2a2218" opacity="0.5"/>
  <g transform="translate(70 55)" filter="url(#grain)">
    <rect x="0" y="0" width="760" height="490" rx="2" fill="#E8DCC4" opacity="0.15"/>
    <g transform="rotate(-1.5 380 245)">
      <rect x="30" y="80" width="280" height="200" rx="2" fill="#EDE4C8" stroke="#B8A078" stroke-width="1" opacity="0.95"/>
      <text x="45" y="108" font-family="serif" font-size="13" fill="#4A3728" font-weight="700">汇款凭证（存根）</text>
      <line x1="40" y1="118" x2="300" y2="118" stroke="#9A8468"/>
      <text x="45" y="142" font-family="serif" font-size="12" fill="#3D2E1F">汇款人：陈阿福</text>
      <text x="45" y="164" font-family="serif" font-size="12" fill="#3D2E1F">收款：澄海县陈氏</text>
      <text x="45" y="186" font-family="serif" font-size="12" fill="#3D2E1F">金额：大洋伍拾元</text>
      <text x="45" y="208" font-family="serif" font-size="11" fill="#6B5344">批局编号：汕批字第328号</text>
      <rect x="200" y="220" width="90" height="36" fill="none" stroke="#A52A2A" stroke-width="1.5" opacity="0.8"/>
      <text x="210" y="243" font-family="serif" font-size="11" fill="#8B0000">已核付</text>
    </g>
    <g transform="translate(120 40)">
      <rect x="0" y="0" width="520" height="380" rx="3" fill="url(#paper)" stroke="#A89068" stroke-width="1.5"/>
      <line x1="20" y1="190" x2="500" y2="190" stroke="#C4B08A" stroke-width="0.8" stroke-dasharray="6 4" opacity="0.6"/>
      <text x="48" y="72" font-family="Noto Serif SC, serif" font-size="15" fill="#2C1810" font-weight="700">批封</text>
      <text x="72" y="110" font-family="Noto Serif SC, KaiTi, serif" font-size="22" fill="#1A1A1A">寄：中国广东省</text>
      <text x="72" y="142" font-family="Noto Serif SC, KaiTi, serif" font-size="22" fill="#1A1A1A">潮汕澄海县隆都镇</text>
      <text x="72" y="174" font-family="Noto Serif SC, KaiTi, serif" font-size="24" fill="#1A1A1A" font-weight="700">陈国栋 先生 收</text>
      <text x="72" y="230" font-family="serif" font-size="14" fill="#5C4030">附银信一封 · 请即转交</text>
      <text x="72" y="320" font-family="serif" font-size="13" fill="#6B5344" opacity="0.85">外批：菲律宾马尼拉寄</text>
      <rect x="380" y="240" width="110" height="130" fill="#F0E4C8" stroke="#8B7355" stroke-width="1" opacity="0.9"/>
      <text x="395" y="268" font-family="Noto Serif SC, serif" font-size="13" fill="#2C1810">华侨</text>
      <text x="395" y="292" font-family="Noto Serif SC, serif" font-size="13" fill="#2C1810">家书</text>
      <text x="395" y="318" font-family="serif" font-size="11" fill="#4A3728">见信如晤</text>
      <path d="M395 330 Q430 350 465 328" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(560 30) rotate(8)">
      <rect x="0" y="0" width="100" height="120" fill="#E0D4BC" stroke="#7A6A52" stroke-width="1.5"/>
      <text x="50" y="38" text-anchor="middle" font-family="serif" font-size="12" fill="#3D2817" font-weight="700">MANILA</text>
      <text x="50" y="56" text-anchor="middle" font-family="serif" font-size="10" fill="#5C4030">P.I.</text>
      <circle cx="50" cy="82" r="26" fill="none" stroke="#6B3410" stroke-width="2.5"/>
      <text x="50" y="78" text-anchor="middle" font-size="9" fill="#6B3410">1932</text>
      <text x="50" y="92" text-anchor="middle" font-size="8" fill="#6B3410">DEC 18</text>
    </g>
    <g transform="translate(480 300)">
      <circle cx="42" cy="42" r="40" fill="none" stroke="#B22222" stroke-width="4" opacity="0.9"/>
      <text x="42" y="36" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="13" fill="#8B0000" font-weight="700">马尼拉</text>
      <text x="42" y="54" text-anchor="middle" font-family="Noto Serif SC, serif" font-size="14" fill="#A52A2A" font-weight="900">批局</text>
    </g>
    <text x="620" y="470" font-family="serif" font-size="11" fill="#8B7355" opacity="0.7">馆藏影像 · 侨批文物数字化</text>
  </g>
</svg>